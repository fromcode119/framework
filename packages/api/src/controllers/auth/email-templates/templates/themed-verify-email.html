<!doctype html>
<html lang="bg">
  <body style="margin:0;padding:0;background:#f5f1fb;font-family:Arial,sans-serif;color:#2d1f42;">
    <div style="display:none;max-height:0;overflow:hidden;opacity:0;">{{title}}</div>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f5f1fb;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#ffffff;border-radius:24px;overflow:hidden;box-shadow:0 18px 60px rgba(74,29,150,0.10);">
            <tr>
              <td style="padding:36px 40px 18px;background:linear-gradient(180deg,#fbf8ff 0%,#ffffff 100%);text-align:center;">
                {{logoHtml}}
                <p style="margin:0 0 12px;font-size:14px;line-height:1.6;color:#6f5f87;">{{greeting}}</p>
                <h1 style="margin:0;font-size:30px;line-height:1.25;font-weight:700;color:#241238;">{{title}}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 18px;">
                <p style="margin:0;font-size:16px;line-height:1.8;color:#5d4f73;text-align:center;">{{message}}</p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:8px 40px 18px;">
                <a href="{{verificationUrl}}" style="display:inline-block;padding:15px 30px;border-radius:999px;background:{{accentColor}};color:#ffffff;text-decoration:none;font-size:15px;font-weight:700;letter-spacing:0.02em;">
                  {{buttonLabel}}
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 40px 12px;">
                <p style="margin:0 0 8px;font-size:13px;line-height:1.7;color:#6f5f87;text-align:center;">{{fallbackLabel}}</p>
                <p style="margin:0;font-size:13px;line-height:1.8;word-break:break-all;color:#4c3d63;text-align:center;">
                  <a href="{{verificationUrl}}" style="color:{{accentColor}};text-decoration:none;">{{verificationUrl}}</a>
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding:12px 40px 36px;">
                <p style="margin:0;font-size:13px;line-height:1.7;color:#8d81a2;text-align:center;">{{ignoreMessage}}</p>
              </td>
            </tr>
            <tr>
              <td style="padding:18px 24px;background:#f8f3ff;border-top:1px solid #ece3fb;">
                <p style="margin:0;font-size:12px;line-height:1.6;color:#8d81a2;text-align:center;">{{footerText}}</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
