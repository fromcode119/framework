# Docker Compose for Full-Stack Mode (API + Admin + Frontend)
# Usage: docker compose -f deploy/docker-compose.full-stack.yml up
# Environment variables are injected via Coolify dashboard or a .env file at repo root.
# All paths are relative to the repo root (project-directory) — required for Coolify compatibility.
# Set COMPOSE_PROFILES=single-domain in Coolify only when you want the gateway service.
# Set EXTERNAL_PROXY_NETWORK to the actual Coolify proxy network name.
# On Coolify hosts, the shared proxy network is typically `coolify` unless
# overridden explicitly by the environment.

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-only
    profiles:
      - single-domain
    depends_on:
      - api
      - admin
      - frontend
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://api.framework.local}
      - ADMIN_URL=${ADMIN_URL:-http://admin.framework.local}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend.framework.local}
      - API_TARGET_URL=http://api:3000
      - ADMIN_TARGET_URL=http://admin:3000
      - FRONTEND_TARGET_URL=http://frontend:3000
    ports:
      - ${GATEWAY_PORT:-80}:3000
    networks:
      - framework
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/api
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-fromcode}:${POSTGRES_PASSWORD:-ChangeMe_Pg_P@ssw0rd}@db:5432/${POSTGRES_DB:-fromcode}
      - DB_DIALECT=postgres
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_JWT_SECRET_MIN_32_CHARS}
      - NODE_ENV=production
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - API_URL=${API_URL:-http://api.framework.local}
      - MARKETPLACE_URL=${MARKETPLACE_URL:-https://marketplace.fromcode.com/marketplace.json}
      - PLUGINS_DIR=/app/plugins
      - THEMES_DIR=/app/themes
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
    depends_on:
      - db
      - redis
    volumes:
      - ../public/uploads:/app/public/uploads
      - ${SHARED_PLUGINS_DIR:-../plugins}:/app/plugins
      - ${SHARED_THEMES_DIR:-../themes}:/app/themes
    networks:
      - framework
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/admin
    environment:
      - API_URL=${INTERNAL_API_URL:-http://api:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - ADMIN_URL=${ADMIN_URL:-http://admin.framework.local}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/frontend
    environment:
      - API_URL=${INTERNAL_API_URL:-http://api:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend.framework.local}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
      - proxy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fromcode}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMe_Pg_P@ssw0rd}
      - POSTGRES_DB=${POSTGRES_DB:-fromcode}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framework
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    networks:
      - framework
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M

networks:
  framework:
  proxy:
    name: ${EXTERNAL_PROXY_NETWORK:-coolify}
    external: true

volumes:
  postgres_data:
