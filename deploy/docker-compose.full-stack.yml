# Docker Compose for Full-Stack Mode (API + Admin + Frontend)
# Usage: docker-compose -f deploy/docker-compose.full-stack.yml up

services:
  api:
    build:
      context: ..
      target: base
    command: npm run start --workspace=@fromcode119/api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - NODE_ENV=production
      - API_URL=${API_PUBLIC_URL}
      - MARKETPLACE_URL=${MARKETPLACE_URL}
      - PLUGINS_DIR=/app/plugins
      - THEMES_DIR=/app/themes
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
    depends_on:
      - db
      - redis
    volumes:
      - ../public/uploads:/app/public/uploads
      - ${SHARED_PLUGINS_DIR:-../plugins}:/app/plugins
      - ${SHARED_THEMES_DIR:-../themes}:/app/themes
    networks:
      - framework
    restart: unless-stopped

  admin:
    build:
      context: ..
      target: base
    command: npm run start --workspace=@fromcode119/admin
    environment:
      - API_URL=http://api:3000
      - NEXT_PUBLIC_API_URL=http://api:3000
      - ADMIN_URL=http://admin:3000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
    restart: unless-stopped

  frontend:
    build:
      context: ..
      target: base
    command: npm run start --workspace=@fromcode119/frontend
    environment:
      - API_URL=http://api:3000
      - NEXT_PUBLIC_API_URL=http://api:3000
      - FRONTEND_URL=http://frontend:3000
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framework
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - framework
    restart: unless-stopped

networks:
  framework:

volumes:
  postgres_data:
