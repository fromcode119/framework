# Docker Compose for API + Admin Mode
# Usage: docker-compose -f deploy/docker-compose.api-admin.yml up

services:
  gateway:
    build:
      context: ..
      dockerfile: Dockerfile
      target: gateway-only
    environment:
      - PORT=3000
      - API_URL=${API_PUBLIC_URL}
      - ADMIN_URL=${ADMIN_PUBLIC_URL}
      - API_TARGET_URL=http://api:3000
      - ADMIN_TARGET_URL=http://admin:3000
    depends_on:
      - api
      - admin
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-only
    command: npm run start --workspace=@fromcode119/api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=production
      - API_URL=${API_PUBLIC_URL}
      - PLUGINS_DIR=/app/plugins
      - THEMES_DIR=/app/themes
    depends_on:
      - db
      - redis
    volumes:
      - ../public/uploads:/app/public/uploads
      - ${SHARED_PLUGINS_DIR:-../plugins}:/app/plugins
      - ${SHARED_THEMES_DIR:-../themes}:/app/themes
    restart: unless-stopped

  admin:
    build:
      context: ..
      dockerfile: Dockerfile
      target: admin-only
    command: npm run start --workspace=@fromcode119/admin
    environment:
      - API_URL=http://api:3000
      - NEXT_PUBLIC_API_URL=${API_PUBLIC_URL}
      - ADMIN_URL=${ADMIN_PUBLIC_URL}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

volumes:
  postgres_data:
