# docker-compose.yml
# Based on framework-plan.md Section 12.2

services:
  # ===================
  # API Service
  # ===================
  api:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode/api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
      - STORAGE_UPLOAD_DIR=${STORAGE_UPLOAD_DIR}
      - STORAGE_PUBLIC_URL=${STORAGE_PUBLIC_URL}
      - PUBLIC_URL=${PUBLIC_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - MARKETPLACE_REGISTRY_URL=${MARKETPLACE_REGISTRY_URL}
      - PLUGINS_DIR=${PLUGINS_DIR}
      - CORS_ALLOWED_DOMAINS=${CORS_ALLOWED_DOMAINS}
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS:-900000}
      - RATE_LIMIT_MAX=${RATE_LIMIT_MAX:-100}
      
      # Storage (S3/R2 Support)
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - STORAGE_S3_REGION=${STORAGE_S3_REGION}
      - STORAGE_S3_BUCKET=${STORAGE_S3_BUCKET}
      - STORAGE_S3_ENDPOINT=${STORAGE_S3_ENDPOINT}
      - STORAGE_S3_KEY=${STORAGE_S3_KEY}
      - STORAGE_S3_SECRET=${STORAGE_S3_SECRET}
      
      # Email (SMTP Support)
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      
      - DEFAULT_LOCALE=${DEFAULT_LOCALE:-en}
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/api/node_modules
      - /app/packages/core/node_modules
      - ./public/uploads:/app/public/uploads
      - ./plugins:/app/plugins
    networks:
      - framework
      - public
    restart: unless-stopped

  # ===================
  # Admin Service
  # ===================
  admin:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode/admin
    environment:
      - API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/admin/node_modules
      - /app/.next
    networks:
      - framework
      - public
    restart: unless-stopped

  # ===================
  # Frontend Service
  # ===================
  frontend:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode/frontend
    environment:
      - API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - NODE_ENV=${NODE_ENV}
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/frontend/node_modules
      - /app/.next
    networks:
      - framework
      - public
    restart: unless-stopped

  # ===================
  # Database
  # ===================
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framework
    restart: unless-stopped

  # ===================
  # Redis
  # ===================
  redis:
    image: redis:7-alpine
    networks:
      - framework
    restart: unless-stopped

networks:
  framework:
  public:
    external: true
    name: web

volumes:
  postgres_data:
