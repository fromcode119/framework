# docker-compose.yml
# Based on framework-plan.md Section 12.2

services:
  # ===================
  # API Service
  # ===================
  api:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode119/api
    env_file: .env
    environment:
      - PLUGINS_DIR=/app/plugins
      - THEMES_DIR=/app/themes
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/api/node_modules
      - /app/packages/core/node_modules
      - /app/packages/admin/node_modules
      - /app/packages/frontend/node_modules
      - ./public/uploads:/app/public/uploads
      - ${SHARED_PLUGINS_DIR:-./plugins}:/app/plugins
      - ${SHARED_THEMES_DIR:-./themes}:/app/themes
    networks:
      - framework
      - docker_web
    restart: unless-stopped

  # ===================
  # Admin Service
  # ===================
  admin:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode119/admin
    environment:
      - API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - NODE_ENV=${NODE_ENV}
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/admin/node_modules
      - /app/packages/admin/.next
      - /app/packages/core/node_modules
    networks:
      - framework
      - docker_web
    restart: unless-stopped

  # ===================
  # Frontend Service
  # ===================
  frontend:
    build:
      context: .
      target: base
    command: npm run dev --workspace=@fromcode119/frontend
    environment:
      - API_URL=${INTERNAL_API_URL}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - NODE_ENV=${NODE_ENV}
      - WATCHPACK_POLLING=true
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
      - /app/packages/frontend/node_modules
      - /app/packages/frontend/.next
      - /app/packages/core/node_modules
    networks:
      - framework
      - docker_web
    restart: unless-stopped

  # ===================
  # Database
  # ===================
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framework
    restart: unless-stopped

  # ===================
  # Redis
  # ===================
  redis:
    image: redis:7-alpine
    networks:
      - framework
    restart: unless-stopped

networks:
  framework:
  docker_web:
    external: true
    name: docker_web

volumes:
  postgres_data:
