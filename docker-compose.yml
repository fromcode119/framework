# Docker Compose for Full-Stack Mode (API + Admin + Frontend)
# Usage: docker compose -f deploy/docker-compose.full-stack.yml up
# Environment variables are injected via Coolify dashboard or a .env file at repo root.
# All paths are relative to the repo root (project-directory) — required for Coolify compatibility.

name: framework

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-only
    profiles:
      - single-domain
    depends_on:
      - api
      - admin
      - frontend
    environment:
      - PORT=3000
      - API_URL=${API_URL:-http://api.framework.local}
      - ADMIN_URL=${ADMIN_URL:-http://admin.framework.local}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend.framework.local}
      - API_TARGET_URL=http://api:3000
      - ADMIN_TARGET_URL=http://admin:3000
      - FRONTEND_TARGET_URL=http://frontend:3000
    ports:
      - ${GATEWAY_PORT:-80}:3000
    networks:
      - framework
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_PROXY_NETWORK:-proxy}"
      - "traefik.http.routers.fc-framework-gateway.rule=Host(`${GATEWAY_HOST:-framework.local}`)"
      - "traefik.http.routers.fc-framework-gateway.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.fc-framework-gateway.tls=${TRAEFIK_TLS_ENABLED:-true}"
      - "traefik.http.services.fc-framework-gateway.loadbalancer.server.port=3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/api
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/app.db}
      - DB_DIALECT=${DB_DIALECT:-sqlite}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - JWT_SECRET=${JWT_SECRET:-CHANGE_ME_JWT_SECRET_MIN_32_CHARS}
      - NODE_ENV=production
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - API_URL=${API_URL:-http://api.framework.local}
      - ADMIN_URL=${ADMIN_URL:-http://admin.framework.local}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend.framework.local}
      - CORS_ALLOWED_DOMAINS=${CORS_ALLOWED_DOMAINS:-framework.local,api.framework.local,admin.framework.local,frontend.framework.local,localhost}
      - MARKETPLACE_URL=${MARKETPLACE_URL:-http://marketplace.framework.local}
      - COOKIE_DOMAIN=${COOKIE_DOMAIN:-.framework.local}
      - PLUGINS_DIR=/app/plugins
      - THEMES_DIR=/app/themes
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
    depends_on:
      - db
      - redis
    extra_hosts:
      - "marketplace.framework.local:host-gateway"
    volumes:
      - ./data:/app/data
      - ./public/uploads:/app/public/uploads
      - ${SHARED_PLUGINS_DIR:-./plugins}:/app/plugins
      - ${SHARED_THEMES_DIR:-./themes}:/app/themes
    networks:
      - framework
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_PROXY_NETWORK:-proxy}"
      - "traefik.http.routers.fc-framework-api.rule=Host(`${API_HOST:-api.framework.local}`)"
      - "traefik.http.routers.fc-framework-api.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.fc-framework-api.tls=${TRAEFIK_TLS_ENABLED:-true}"
      - "traefik.http.services.fc-framework-api.loadbalancer.server.port=3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: admin-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/admin
    environment:
      - API_URL=${INTERNAL_API_URL:-http://api:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
      - NEXT_PUBLIC_ADMIN_AI_ENABLED=${NEXT_PUBLIC_ADMIN_AI_ENABLED:-false}
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - ADMIN_URL=${ADMIN_URL:-http://admin.framework.local}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_PROXY_NETWORK:-proxy}"
      - "traefik.http.routers.fc-framework-admin.rule=Host(`${ADMIN_HOST:-admin.framework.local}`)"
      - "traefik.http.routers.fc-framework-admin.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.fc-framework-admin.tls=${TRAEFIK_TLS_ENABLED:-true}"
      - "traefik.http.routers.fc-framework-admin.priority=100"
      - "traefik.http.services.fc-framework-admin.loadbalancer.server.port=3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-only
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
        - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
        - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
    command: npm run start --workspace=@fromcode119/frontend
    environment:
      - API_URL=${INTERNAL_API_URL:-http://api:3000}
      - NEXT_PUBLIC_API_URL=${API_URL:-http://api.framework.local}
      - API_VERSION_PREFIX=${API_VERSION_PREFIX:-v1}
      - NEXT_PUBLIC_API_VERSION=${API_VERSION_PREFIX:-v1}
      - FRONTEND_URL=${FRONTEND_URL:-http://frontend.framework.local}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - api
    networks:
      - framework
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${EXTERNAL_PROXY_NETWORK:-proxy}"
      - "traefik.http.routers.fc-framework-frontend.rule=Host(`${FRONTEND_HOST:-frontend.framework.local}`)"
      - "traefik.http.routers.fc-framework-frontend.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}"
      - "traefik.http.routers.fc-framework-frontend.tls=${TRAEFIK_TLS_ENABLED:-true}"
      - "traefik.http.services.fc-framework-frontend.loadbalancer.server.port=3000"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-fromcode}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeMe_Pg_P@ssw0rd}
      - POSTGRES_DB=${POSTGRES_DB:-fromcode}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - framework
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  redis:
    image: redis:7-alpine
    networks:
      - framework
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 96M

networks:
  framework:
  proxy:
    external: true
    name: ${EXTERNAL_PROXY_NETWORK:-proxy}

volumes:
  postgres_data:
