name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Fix imports in build
        run: python3 scripts/fix-imports.py

      - name: Test
        run: npm test --workspaces --if-present
        env:
          LOG_LEVEL: ERROR
