name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fromcode119'

      - name: Install dependencies
        run: npm ci

      # ── Build all packages ────────────────────────────────────────────────
      - name: Build
        run: npm run build

      - name: Fix imports in build
        run: python3 scripts/fix-imports.py

      # ── Publish all non-private packages ──────────────────────────────────
      - name: Publish packages
        run: npm publish --workspaces --if-present
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
